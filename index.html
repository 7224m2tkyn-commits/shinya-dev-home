<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>深夜開発大学生</title>

  <style>
    body {
      margin: 0;
      background: #f5f7fb;
      color: #222;
      font-family: sans-serif;
    }

    header {
      background: #222;
      color: white;
      padding: 24px 40px;
    }

    header h1 {
      margin: 0;
      font-size: 32px;
    }

    header p {
      margin: 8px 0 0;
      color: #ccc;
    }

    main {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 24px;
    }

    .intro {
      background: white;
      padding: 28px;
      border-radius: 18px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
      margin-bottom: 28px;
    }

    .apps {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 22px;
    }

    .card {
      background: white;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
      text-decoration: none;
      color: inherit;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    .thumb {
      height: 150px;
      background: linear-gradient(135deg, #6c63ff, #00c2a8);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
    }

    .card-body {
      padding: 20px;
    }

    .card-body h2 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    .card-body p {
      margin: 0;
      color: #666;
      line-height: 1.6;
    }

    footer {
      text-align: center;
      color: #888;
      padding: 40px 20px;
    }
  </style>
</head>

<body>
  <header>
    <h1>Shinya Dev</h1>
    <p>作ったAIツールやサイトをまとめるホームページ</p>
  </header>

  <main>
    <section class="intro">
      <h2>ようこそ！</h2>
      <p>
        私が過去に作ったツールをまとめていきます。
        気になるものはクリックして使ってみてください。
      </p>
    </section>

    <section class="apps">
      <a class="card" href="https://ai-essay-machine.streamlit.app/" target="_blank">
        <div class="thumb">AI Essay</div>
        <div class="card-body">
          <h2>AI英作文修正マシーン🤖</h2>
          <p>英作文のAI度を測定し、学生英語に修正するツールです。生成AIとの併用がおすすめ</p>
        </div>
      </a>

      <a class="card" href="#">
        <div class="thumb">Coming Soon</div>
        <div class="card-body">
          <h2>次のツール</h2>
          <p>新しいAIツールはここに追加していきます。</p>
        </div>
      </a>
    </section>
  </main>

  <footer>
    © 2026 Shinya Dev
  </footer>
</body>
</html>
