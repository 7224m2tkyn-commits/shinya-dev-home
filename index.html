<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shinya Dev</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(90, 80, 255, 0.25), transparent 35%),
        radial-gradient(circle at bottom right, rgba(0, 220, 180, 0.18), transparent 35%),
        #08090d;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 32px;
    }

    .card {
      width: 100%;
      max-width: 920px;
      padding: 56px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(18px);
      box-shadow: 0 30px 100px rgba(0,0,0,0.45);
    }

    .tag {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.1);
      color: #9fffe8;
      font-size: 14px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: clamp(48px, 8vw, 92px);
      margin: 0;
      letter-spacing: -3px;
      line-height: 0.95;
    }

    .gradient {
      background: linear-gradient(90deg, #ffffff, #8fffe1, #9b8cff);
      -webkit-background-clip: text;
      color: transparent;
    }

    p {
      max-width: 620px;
      color: #c9ccd6;
      font-size: 18px;
      line-height: 1.8;
      margin: 28px 0 36px;
    }

    .buttons {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    a {
      text-decoration: none;
      color: white;
      padding: 14px 22px;
      border-radius: 14px;
      font-weight: 700;
      transition: 0.2s;
    }

    .primary {
      background: linear-gradient(135deg, #6c63ff, #00d6b4);
    }

    .secondary {
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.07);
    }

    a:hover {
      transform: translateY(-3px);
      filter: brightness(1.15);
    }

    .footer {
      margin-top: 52px;
      color: #747987;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      .card {
        padding: 34px 24px;
      }

      h1 {
        letter-spacing: -2px;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="tag">AI Tools / Student Developer</div>

    <h1>
      Shinya<br>
      <span class="gradient">Dev.</span>
    </h1>

    <p>
      日常をちょっと便利にするAIツールを作っています。
      制作物はここからどうぞ
    </p>

    <div class="buttons">
      <a class="primary" href="https://ai-essay-machine.streamlit.app/" target="_blank">
        AI Essay Machine
      </a>

      <a class="secondary" href="#">
        Coming Soon
      </a>
    </div>

    <div class="footer">
      shinya-dev.com
    </div>
  </main>
</body>
</html>
