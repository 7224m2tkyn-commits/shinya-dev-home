<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>深夜開発大学生</title>

  <style>
    body{
      margin:0;
      background:#0d0f14;
      color:white;
      font-family:sans-serif;
    }

    header{
      padding:40px 25px;
      border-bottom:1px solid rgba(255,255,255,0.08);
      background:
      linear-gradient(to bottom,
      rgba(255,255,255,0.03),
      transparent);
    }

    header h1{
      margin:0;
      font-size:42px;
    }

    header p{
      margin-top:10px;
      color:#aaa;
      line-height:1.7;
    }

    main{
      max-width:1100px;
      margin:auto;
      padding:35px 20px;
    }

    .section-title{
      font-size:28px;
      margin-bottom:20px;
    }

    .apps{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:25px;
    }

    .card{
      background:#171b22;
      border-radius:22px;
      overflow:hidden;
      text-decoration:none;
      color:white;
      transition:0.2s;
      border:1px solid rgba(255,255,255,0.05);
    }

    .card:hover{
      transform:translateY(-6px);
      background:#1d222c;
    }

    .thumbnail{
      height:170px;
      background:
      linear-gradient(135deg,#6d5cff,#00c2a8);
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:50px;
    }

    .content{
      padding:22px;
    }

    .content h2{
      margin:0 0 12px;
      font-size:24px;
    }

    .content p{
      margin:0;
      color:#b8bcc7;
      line-height:1.8;
    }

    .tag{
      display:inline-block;
      margin-top:18px;
      background:#2b3240;
      color:#d6dcff;
      padding:8px 14px;
      border-radius:999px;
      font-size:14px;
    }

    footer{
      text-align:center;
      color:#777;
      padding:50px 20px;
      font-size:14px;
    }
  </style>
</head>

<body>

  <header>
    <h1>深夜開発大学生</h1>

    <p>
      大学生がノリで開発したAIツールを置いていく場所。<br>
      日常で使える便利ツールをゆるく増やしていきます。
    </p>
  </header>

  <main>

    <div class="section-title">
      公開中のツール
    </div>

    <section class="apps">

      <a class="card"
      href="https://ai-essay-machine.streamlit.app/"
      target="_blank">

        <div class="thumbnail">
          🤖
        </div>

        <div class="content">
          <h2>AI英作文修正マシーン🤖</h2>

          <p>
            英作文をAIっぽさの観点から分析し、学生英語に修正を行うツールです。
            生成AIと組み合わせて課題やレポートにどうぞ
          </p>

          <div class="tag">
            English / AI
          </div>
        </div>

      </a>

      <div class="card">

        <div class="thumbnail"
        style="background:linear-gradient(135deg,#444,#222);">
          🌙
        </div>

        <div class="content">
          <h2>Coming Soon</h2>

          <p>
            新しいツールを開発中です。<br>
            深夜テンションで増えていく予定。
          </p>

          <div class="tag">
            Under Development
          </div>
        </div>

      </div>

    </section>

  </main>

  <footer>
    © 2026 深夜開発大学生
  </footer>

</body>
</html>
